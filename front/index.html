<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Manager</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Service Manager</h1>

        <p>Bem-vindo ao Service Manager. Aqui você pode gerenciar seus serviços de forma eficiente.</p>
        <p>Vamos te registrar em nosso sistema.</p>

        <form id="formCliente">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" required placeholder="Ex: João da Silva">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="Ex: joao@email.com">

            <label for="telefone">Telefone:</label>
            <input
                type="tel"
                id="telefone"
                name="telefone"
                required
                placeholder="(11) 99999-9999"
                pattern="\(?\d{2}\)?\s?\d{4,5}-?\d{4}"
                title="Formato esperado: (11) 99999-9999"
            >

            <input type="submit" value="Registrar">
        </form>

        <p id="mensagem"></p>
    </div>

    <script>
        const form = document.getElementById("formCliente");
        const mensagem = document.getElementById("mensagem");

        form.addEventListener('submit', async function (event) {

            event.preventDefault();

            const nome     = document.getElementById("nome").value;
            const email    = document.getElementById("email").value;
            const telefone = document.getElementById("telefone").value;

            try {

                const response = await fetch("http://localhost:3000/clientes", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ nome, email, telefone })
                });

                const data = await response.json();

                if (response.ok) {

                    mensagem.innerText = data.message;
                    mensagem.style.color = "green";

                    setTimeout(() => {
                        mensagem.innerText = "";
                    }, 3000);

                    form.reset();

                } else {

                    mensagem.innerText = data.error;
                    mensagem.style.color = response.status === 409 ? "orange" : "red";
                }

            } catch (error) {

                mensagem.innerText = "Erro ao conectar com o servidor.";
                mensagem.style.color = "red";
            }
        });
    </script>

</body>

</html>
